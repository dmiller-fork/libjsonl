<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>JSONL Tool</title>
</head>
<body>

<h3>JSONL Tool</h3>

<label>Mode:</label>
<select id="mode">
	<option value="sort">Sort</option>
	<option value="sum">Sum</option>
	<option value="filter">Filter</option>
</select>

<br><br>

<label>Key:</label>
<input id="key" type="text" value="id">

<label>Val:</label>
<input id="val" type="text" value="2">

<br><br>

<textarea id="input" rows="10" cols="60">{id:"1", name:"Alice"}
{id:"3", name:"carl"}
{id:"2", name:"bob"}</textarea>

<br><br>

<button id="runBtn">Run</button>

<pre id="output"></pre>

<script src="jsonl.js"></script>

<script>
let wasm;

jsonl({
  print: function(text) {
    const out = document.getElementById("output");
    out.textContent += text + "\n";
  }
}).then(function(Module) {
  wasm = Module;
});

document.getElementById("runBtn").onclick = function() {
  const input = document.getElementById("input").value;
  const key = document.getElementById("key").value;
  const mode = document.getElementById("mode").value;
	const val = document.getElementById("val").value;

  const out = document.getElementById("output");
  out.textContent = "";

  if (mode === "sort") {
    wasm.ccall(
      'jsonl_wasm_sort',
      'void',
      ['string','number','string'],
      [input, input.length, key]
    );
  } else if (mode === "sum") {
    wasm.ccall(
      'jsonl_wasm_sum',
      'void',
      ['string','number','string'],
      [input, input.length, key]
    );
  } else if (mode === "filter") {
    wasm.ccall(
      'jsonl_wasm_filter',
      'int',
      ['string','number','string', 'string'],
      [input, input.length, key, val]
    );
  } 
};
</script>

</body>
</html>
