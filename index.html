<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>JSONL Tool</title>
</head>
<body>

<h3>JSONL Tool</h3>

<label>Mode:</label>
<select id="mode">
	<option value="sort">Sort</option>
	<option value="sum">Sum</option>
	<option value="filter">Filter</option>
	<option value="join">Join</option>
</select>

<br><br>

<label>Key:</label>
<input id="key" type="text" value="id">

<span id="valBox" style="display:none;">
<label>Val:</label>
<input id="val" type="text" value="2">
</span>

<br><br>

<textarea id="input" rows="10" cols="60">{id:"1", name:"Alice"}
{id:"3", name:"carl"}
{id:"2", name:"bob"}</textarea>

<span id="joinBox" style="display:none;">
<textarea id="input2" rows="10" cols="60">{id:"1", name:"Alice"}
{id:"3", name:"carl"}
{id:"2", name:"bob"}</textarea>
</span>
<div style="display:block">
<button id="runBtn">Run</button>
</div>

<pre id="output"></pre>

<script>
const mode = document.getElementById("mode");
const valBox = document.getElementById("valBox");

mode.addEventListener("change", function () {
	valBox.style.display = (mode.value === "filter") ? "inline" : "none";
	joinBox.style.display = (mode.value === "join") ? "inline" : "none";
});
</script>

<script src="jsonl.js"></script>

<script>
let wasm;

jsonl({
  print: function(text) {
    const out = document.getElementById("output");
    out.textContent += text + "\n";
  }
}).then(function(Module) {
  wasm = Module;
});

document.getElementById("runBtn").onclick = function() {
  const input = document.getElementById("input").value;
  const input2 = document.getElementById("input2").value;
  const key = document.getElementById("key").value;
  const mode = document.getElementById("mode").value;
	const val = document.getElementById("val").value;

  const out = document.getElementById("output");
  out.textContent = "";

  if (mode === "sort") {
    wasm.ccall(
      'jsonl_wasm_sort',
      'void',
      ['string','number','string'],
      [input, input.length, key]
    );
  } else if (mode === "sum") {
    wasm.ccall(
      'jsonl_wasm_sum',
      'void',
      ['string','number','string'],
      [input, input.length, key]
    );
  } else if (mode === "filter") {
    wasm.ccall(
      'jsonl_wasm_filter',
      'int',
      ['string','number','string', 'string'],
      [input, input.length, key, val]
    );
  } else if (mode === "join") {
    wasm.ccall(
      'jsonl_wasm_join',
      'int',
      ['string', 'string', 'number', 'number', 'string'],
      [input, input2, input.length, input2.length, key]
    );
  } 
};
</script>

</body>
</html>
